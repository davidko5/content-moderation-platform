services:
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"     # AMQP — your services connect here
      - "15672:15672"   # web UI — you open this in a browser
    environment:
      RABBITMQ_DEFAULT_USER: dev
      RABBITMQ_DEFAULT_PASS: dev

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_MULTIPLE_DATABASES: ingest,classification
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro

volumes:
  pgdata:
